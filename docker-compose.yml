version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
       - "8443:443"
       - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
    networks:
      - app-network

  web1:
    build: .
    container_name: nextjs_app
    volumes:
      - ./prisma:/app/prisma  
    working_dir: /app
    entrypoint: ["./entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file: .env
    depends_on:
      - db
    networks:
      - app-network

  web2:
    build: .
    container_name: nextjs_app2
    volumes:
      - ./prisma:/app/prisma  
    working_dir: /app
    entrypoint: ["./entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file: .env
    depends_on:
      - db
    networks:
      - app-network



  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
