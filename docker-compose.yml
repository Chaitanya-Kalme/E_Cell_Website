version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
       - "8443:443"
       - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
    networks:
      - app-network

  web1:
    build: .
    container_name: nextjs_app
    volumes:
      - ./prisma:/app/prisma  
    working_dir: /app
    entrypoint: ["./entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file: .env
    depends_on:
      - db
    networks:
      - app-network

  web2:
    build: .
    container_name: nextjs_app2
    volumes:
      - ./prisma:/app/prisma  
    working_dir: /app
    entrypoint: ["./entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file: .env
    depends_on:
      - db
    networks:
      - app-network



  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - app-network
  db_backup:
    image: postgres:15
    container_name: postgres_backup
    depends_on:
      - db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./backup:/backups
    networks:
      - app-network
    command: >
      bash -c "
        echo '🚀 Database backup service started';
        while true; do
          echo '📦 Running backup at' $(date);
          BACKUP_FILE=/backups/backup_$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h db -U ${POSTGRES_USER} ${POSTGRES_DB} | gzip > $BACKUP_FILE;
          echo '✅ Backup saved to' $BACKUP_FILE;
          # Keep only the 5 latest backups
          ls -t /backups/backup_*.sql.gz | tail -n +6 | xargs -r rm --;
          echo '🧹 Old backups cleaned up';
          echo '⏳ Sleeping for 3 weeks...';
          sleep $((21*24*60*60));  # 3 weeks
        done
      "
volumes:
  pgdata:

networks:
  app-network:
